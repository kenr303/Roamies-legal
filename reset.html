<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Roamies</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A1A2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #16213E;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #4F46E5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 { color: #ffffff; font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: block;
      background: #4F46E5;
      color: #ffffff;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .error { color: #f87171; font-size: 14px; margin-top: 16px; }
    .note { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <h1>Reset your password</h1>
    <p>Tap the button below to open Roamies and choose a new password. This link expires in 1 hour.</p>
    <a href="#" id="openBtn" class="btn">Open Roamies</a>
    <p class="note">If the app doesn't open, make sure Roamies is installed on your device.</p>
    <p id="errorMsg" class="error" style="display:none;">
      This reset link is invalid or has expired. Please request a new one in the app.
    </p>
  </div>
  <script>
    (function () {
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var accessToken = params.get("access_token");
      var refreshToken = params.get("refresh_token") || "";
      var type = params.get("type");

      if (!accessToken || type !== "recovery") {
        document.getElementById("openBtn").style.display = "none";
        document.getElementById("errorMsg").style.display = "block";
        return;
      }

      var deepLink =
        "roamies://reset-password?access_token=" +
        encodeURIComponent(accessToken) +
        "&refresh_token=" +
        encodeURIComponent(refreshToken);

      document.getElementById("openBtn").href = deepLink;

      setTimeout(function () {
        window.location.href = deepLink;
      }, 1800);
    })();
  </script>
</body>
</html>
