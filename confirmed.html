<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Roamies</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A1A2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #16213E;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #4F46E5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 { color: #ffffff; font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: block;
      background: #4F46E5;
      color: #ffffff;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .note { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your Roamies account is verified. Open the app to sign in and start planning your trips.</p>
    <a href="roamies://" class="btn">Open Roamies</a>
    <p class="note">If the app doesn't open, make sure Roamies is installed on your device.</p>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = "roamies://";
    }, 1800);
  </script>
</body>
</html>
